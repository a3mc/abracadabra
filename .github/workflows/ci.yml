name: ci

# Triggers (intentionally minimal — see CI policy notes):
#
#   workflow_dispatch  manual run from the Actions tab. Use this to
#                     sanity-check main before tagging a release.
#
#   pull_request      verify every PR before merge. Path-filtered so a
#                     docs-only PR (README, CHANGELOG, gitignore tweak)
#                     does NOT spend a 5-min runner re-building Rust.
#
#   push tags v*      run the same checks against a release tag (incl.
#                     pre-release tags like v0.2.0-rc1). This pairs
#                     with release.yml which builds + publishes
#                     artefacts on the same tag.
#
# No push trigger on `main`. Daily commits to main do not fire CI;
# the developer either runs the same checks locally (`cargo xtask
# lint-prod && cargo test --workspace`) or hits "Run workflow" in
# the Actions tab before tagging.

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE-*'
      - '.gitignore'
      - 'docs/**'
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: build · test · lint
    # Pinned to ubuntu-22.04 to mirror the release runner so CI catches
    # glibc / toolchain issues before they reach tag-time. Bumping the
    # release runner forward in time should bump this one too.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cache
        uses: Swatinem/rust-cache@v2

      - name: rustfmt --check
        run: cargo fmt --all -- --check

      - name: build (release, locked)
        run: cargo build --workspace --release --locked

      - name: test (workspace, locked)
        run: cargo test --workspace --locked

      - name: clippy (production code)
        run: cargo xtask lint-prod

      # Strict: all targets (lib + bins + tests + examples), all
      # crates including xtask, deny warnings. Tests get
      # `#![cfg_attr(test, allow(...))]` exemptions at lib.rs for
      # rules CLAUDE.md explicitly waives in test code (unwrap/expect,
      # unreadable_literal, float_cmp).
      - name: clippy (strict, all targets)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
